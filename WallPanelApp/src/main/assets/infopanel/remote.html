<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>InfoPanel 遥控页面</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#090706;color:#ffd6a1;font-family:Arial,"Noto Sans SC",sans-serif}button{font:inherit}.screen{position:fixed;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse,#3a1809,#090706 62%)}.clock{display:flex;align-items:center;font-size:15vw;font-weight:300;letter-spacing:.02em;color:#ffbd61;text-shadow:0 0 5px #fff0c7,0 0 18px #ff6500,0 0 45px #d62b00}.zones{position:fixed;z-index:5;top:0;right:0;bottom:0;left:0;display:flex}.zones button{width:33.333%;height:100%;border:0;background:transparent}.weather,.media{position:fixed;z-index:4;top:0;right:0;bottom:0;left:0;display:none;align-items:center;padding:8vw;color:#fff}.weather{background:linear-gradient(155deg,#1c2d3b,#9aa8aa)}.weather h1{margin:0;font-size:12vw;font-weight:200}.weather p{font-size:5vw}.weather strong{font-size:9vw;font-weight:200}.media{justify-content:center;background:linear-gradient(145deg,#10242a,#071014);text-align:center}.media h1{font-size:8vw;font-weight:300;color:#85e8d2}.media p{font-size:3vw;color:#b8dadd}.hint{position:fixed;z-index:3;bottom:18px;width:100%;text-align:center;color:#856b58;font-size:14px}.connecting{position:fixed;z-index:8;right:18px;bottom:16px;display:none;color:#fff;font-size:14px;pointer-events:none;text-shadow:0 1px 5px #000}.noise-on .clock{color:#ffd18a;text-shadow:0 0 6px #fff,0 0 23px #ff7300,0 0 58px #ef3000}
</style>
</head>
<body>
<main class="screen"><div id="clock" class="clock">--:--:--</div>
    <!-- 远控端clock不做css支持 -->
<div class="hint">左：天气　中：白噪音　右：平板媒体摘要</div></main>
<section id="weather" class="weather"><div><h1>杭州</h1><p>微雨</p><strong>32—37°C</strong></div></section>
<section id="media" class="media"><div><h1>平板媒体摘要页</h1><p>webcamera没做呢</p></div></section>
<div id="connecting" class="connecting">connecting...</div>
<div class="zones"><button data-action="left" aria-label="天气"></button><button data-action="center" aria-label="白噪音"></button><button data-action="right" aria-label="平板媒体摘要"></button></div>
<script>
(function(){var clock=document.getElementById('clock'),weather=document.getElementById('weather'),media=document.getElementById('media'),connecting=document.getElementById('connecting'),currentScreen='clock',requestNumber=0;function pad(n){return n<10?'0'+n:n}function tick(){var d=new Date;clock.textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())}function render(state){currentScreen=state&&state.screen||'clock';weather.style.display=currentScreen==='weather'?'flex':'none';media.style.display=currentScreen==='media'?'flex':'none';document.body.className=state&&(state.noisePlaying||state.noisePreparing)?'noise-on':''}function state(){return fetch('/api/state',{cache:'no-store'}).then(function(r){return r.json()}).then(render)}function send(action){var ownRequest=++requestNumber;if(action==='left'&&currentScreen!=='clock')action='clock';connecting.style.display='block';fetch('/api/action?name='+encodeURIComponent(action),{cache:'no-store'}).then(function(r){return r.json()}).then(function(data){render(data);if(ownRequest===requestNumber)connecting.style.display='none'})}var b=document.querySelectorAll('[data-action]');for(var i=0;i<b.length;i++)b[i].onclick=function(){send(this.getAttribute('data-action'))};tick();setInterval(tick,250);state();setInterval(state,2000)})();
</script>
</body>
</html>
